<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TruePrice — Калькулятор реальной стоимости</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="nav">
      <div class="logo"><span class="logo-icon">TP</span><span class="logo-text">TruePrice</span></div>
      <a href="admin.html" class="lang-btn">Admin</a>
    </nav>

    <main class="hero">
      <p class="eyebrow">Калькулятор реальной стоимости</p>
      <h1>Сколько ты <span class="gradient">реально</span> заплатишь?</h1>
      <p class="subtitle">Поиск, landed cost и сравнение сценариев для Азербайджана.</p>

      <section class="search-wrap" id="searchWrap">
        <div class="country" id="countrySelect">
          <button class="country-btn" id="countryBtn">🇦🇿 Азербайджан · Баку · AZN ▾</button>
          <ul class="country-menu" id="countryMenu"></ul>
        </div>
        <input id="queryInput" placeholder="Введи название товара — iPhone, Samsung, PS5, MacBook..." />
        <button class="calc-btn" id="calcBtn">Рассчитать</button>
      </section>

      <div class="chips" id="chips"></div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
