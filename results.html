<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TruePrice — Результаты</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="nav">
      <a href="index.html" class="logo">
        <span class="logo-icon">TP</span>
        <span class="logo-text">TruePrice</span>
      </a>
      <div class="lang-switcher" id="langSwitcher">
        <button class="lang-btn" id="langBtn">🇷🇺 RU ▾</button>
        <ul class="lang-menu" id="langMenu">
          <li class="active">🇷🇺 RU ✓</li>
          <li>🇦🇿 AZ</li>
          <li>🇬🇧 EN</li>
        </ul>
      </div>
    </nav>

    <main class="results">
      <section class="panel results-search">
        <section class="search-wrap" id="searchWrap">
          <div class="country" id="countrySelect">
            <button class="country-btn" id="countryBtn">🇦🇿 Азербайджан · Баку · AZN ▾</button>
            <ul class="country-menu" id="countryMenu">
              <li class="active" data-country="az">🇦🇿 Азербайджан · Баку · AZN ✓</li>
              <li class="soon">🇬🇪 Грузия · Тбилиси · GEL <span>скоро</span></li>
              <li class="soon">🇦🇲 Армения · Ереван · AMD <span>скоро</span></li>
              <li class="soon">🇺🇿 Узбекистан · Ташкент · UZS <span>скоро</span></li>
              <li class="soon">🇰🇿 Казахстан · Алматы · KZT <span>скоро</span></li>
            </ul>
          </div>
          <input id="queryInput" placeholder="Введи название товара — iPhone, Samsung, PS5, MacBook..." />
          <button class="calc-btn" id="calcBtn">Рассчитать</button>
        </section>
      </section>

      <div id="loadingState" class="panel loading">Считаем landed cost… это может занять 1–2 секунды.</div>
      <div id="resultsRoot"></div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
